name: Forward Submission to nsu-prod-docs

on:
  push:
    branches: [main]
    paths: ['submissions/**']

jobs:
  forward:
    if: "!contains(github.event.head_commit.message, '[cleanup]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: nsuok-programmers
          repositories: nsu-prod-docs

      - name: Push files and open PR on nsu-prod-docs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Locate the submitted table
          SUBMISSION_DIR=$(find submissions/table-definitions -mindepth 2 -maxdepth 2 -type d | head -1)
          TABLE_TYPE=$(echo "$SUBMISSION_DIR" | cut -d'/' -f3)
          TABLE_NAME=$(echo "$SUBMISSION_DIR" | cut -d'/' -f4)

          # Read metadata
          META="submissions/table-definitions/$TABLE_TYPE/$TABLE_NAME/metadata.json"
          SUBMITTER_NAME=$(jq -r '.submitterName' "$META")
          SUBMITTER_TEAM=$(jq -r '.submitterTeam' "$META")
          DESCRIPTION=$(jq -r '.description // ""' "$META")
          VERB=$(jq -r '.verb' "$META")

          # Clone prod repo and create branch
          git clone https://x-access-token:${GH_TOKEN}@github.com/nsuok-programmers/nsu-prod-docs.git prod-repo
          cd prod-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="submissions/${VERB}/${TABLE_NAME}"
          git checkout -b "$BRANCH"

          # Copy files, excluding metadata.json
          mkdir -p "table-definitions/$TABLE_TYPE/$TABLE_NAME"
          rsync -a --exclude='metadata.json' \
            "../submissions/table-definitions/$TABLE_TYPE/$TABLE_NAME/" \
            "table-definitions/$TABLE_TYPE/$TABLE_NAME/"

          git add table-definitions/
          git commit -m "submission: ${VERB} ${TABLE_NAME} table definition"
          git push origin "$BRANCH"

          # Open PR on nsu-prod-docs
          PR_BODY="**Submitted by:** ${SUBMITTER_NAME} (${SUBMITTER_TEAM})"
          if [ -n "$DESCRIPTION" ] && [ "$DESCRIPTION" != "null" ]; then
            PR_BODY="${PR_BODY}"$'\n\n'"**Notes:** ${DESCRIPTION}"
          fi

          gh pr create \
            --repo nsuok-programmers/nsu-prod-docs \
            --head "$BRANCH" \
            --base main \
            --title "submission: ${VERB} ${TABLE_NAME} table definition" \
            --body "$PR_BODY"

      - name: Clear submissions from main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -rf submissions/
          git commit -m "cleanup: clear submissions after forwarding [cleanup]"
          git push
