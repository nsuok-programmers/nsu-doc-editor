name: Forward Submission to nsu-prod-docs

on:
  pull_request:
    types: [labeled]

jobs:
  forward:
    if: github.event.label.name == 'forward' && startsWith(github.event.pull_request.head.ref, 'submissions/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: nathantbeene
          repositories: nsu-prod-docs

      - name: Checkout submission branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Push files and open PR on nsu-prod-docs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Clone prod repo and create branch
          git clone https://x-access-token:${GH_TOKEN}@github.com/nathantbeene/nsu-prod-docs.git prod-repo
          cd prod-repo
          git checkout -b "${PR_BRANCH}"

          # Copy table-definitions from the submission branch
          cp -r ../table-definitions ./

          git add table-definitions/
          git commit -m "${PR_TITLE}"
          git push origin "${PR_BRANCH}"

          # Open PR on nsu-prod-docs
          gh pr create \
            --repo nathantbeene/nsu-prod-docs \
            --head "${PR_BRANCH}" \
            --base main \
            --title "${PR_TITLE}" \
            --body "${PR_BODY}"

      - name: Delete submission branch from nsu-doc-editor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method DELETE \
            /repos/nathantbeene/nsu-doc-editor/git/refs/heads/${{ github.event.pull_request.head.ref }}
